# Vakkio Connekkt · agente local (Docker). Corre en cualquier caja Linux encendida 24/7.
#
#   1) genera un código en la web por cada integración que quieras:
#        Tuya → Dispositivos → Integraciones → Vincular agente
#        Tapo → Dispositivos → TP-Link Tapo → Conectar
#   2) copia .env.example a .env y rellénalo (códigos + credenciales)
#   3) arranca SOLO las integraciones que uses, con "profiles":
#        docker compose --profile tuya up -d
#        docker compose --profile tapo up -d
#        docker compose --profile tuya --profile tapo up -d      (ambas)
#
# Cada integración es un contenedor con su propio token en su volumen. Watchtower
# mantiene todo ACTUALIZADO solo. El código solo hace falta el PRIMER arranque.
services:
  # --- Tuya / SmartLife (nube) ---
  vakkio-tuya:
    image: ghcr.io/pedrowoobik/vakkio-connekkt:latest
    # para construir en local: comenta 'image' y descomenta 'build: .'
    # build: .
    container_name: vakkio-tuya
    profiles: ["tuya"]
    restart: unless-stopped
    env_file: .env
    environment:
      - COLLECTOR=tuya
      - PAIRING_CODE=${PAIRING_CODE_TUYA:-}
    volumes:
      - vakkio-tuya-data:/data

  # --- TP-Link Tapo (LOCAL, protocolo KLAP) ---
  # host networking: necesario para descubrir los enchufes en tu red local.
  # Requiere un host LINUX en la MISMA red que los Tapo (no sirve Docker Desktop Mac/Win).
  vakkio-tapo:
    image: ghcr.io/pedrowoobik/vakkio-connekkt:latest
    container_name: vakkio-tapo
    profiles: ["tapo"]
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - COLLECTOR=tapo
      - PAIRING_CODE=${PAIRING_CODE_TAPO:-}
    volumes:
      - vakkio-tapo-data:/data

  # actualización automática del agente (recomendado; quítalo si no lo quieres)
  watchtower:
    image: containrrr/watchtower
    container_name: vakkio-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 3600

volumes:
  vakkio-tuya-data:
  vakkio-tapo-data:
